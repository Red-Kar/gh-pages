<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Message</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
    }
    input {
      width: 320px;
    }
    button {
      cursor: pointer;
      margin-left: 8px;
    }
    #output {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      white-space: pre-wrap;
      min-height: 120px;
    }
    #meta {
      color: #666;
      margin-bottom: 12px;
    }
    .error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <h1>Secure Message</h1>
  <div id="meta">Loading metadata...</div>

  <input id="passphrase" type="password" placeholder="Enter passphrase" />
  <button id="decryptBtn">Decrypt</button>

  <div id="output"></div>

  <script>
    let encryptedPayload = null;

    async function loadMessage() {
      const response = await fetch(`message.json?v=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error("Unable to load message.json");
      }
      encryptedPayload = await response.json();
      document.getElementById("meta").textContent =
        `Title: ${encryptedPayload.title || "N/A"} | Created: ${encryptedPayload.createdAt || "N/A"}`;
    }

    function base64ToBytes(base64) {
      return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    }

    async function deriveKey(passphrase, saltBytes) {
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        encoder.encode(passphrase),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: saltBytes,
          iterations: 250000,
          hash: "SHA-256"
        },
        keyMaterial,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["decrypt"]
      );
    }

    async function decryptMessage() {
      const output = document.getElementById("output");
      output.className = "";
      output.textContent = "Decrypting...";

      try {
        if (!encryptedPayload) {
          throw new Error("Message not loaded");
        }

        const passphrase = document.getElementById("passphrase").value;
        if (!passphrase) {
          throw new Error("Passphrase is required");
        }

        const salt = base64ToBytes(encryptedPayload.salt);
        const iv = base64ToBytes(encryptedPayload.iv);
        const ciphertext = base64ToBytes(encryptedPayload.ciphertext);

        const key = await deriveKey(passphrase, salt);

        const decrypted = await crypto.subtle.decrypt(
          {
            name: "AES-GCM",
            iv: iv
          },
          key,
          ciphertext
        );

        const decoder = new TextDecoder();
        output.textContent = decoder.decode(decrypted);
      } catch (e) {
        output.className = "error";
        output.textContent = "Unable to decrypt. Wrong passphrase or invalid payload.";
      }
    }

    document.getElementById("decryptBtn").addEventListener("click", decryptMessage);

    loadMessage().catch(err => {
      const output = document.getElementById("output");
      document.getElementById("meta").textContent = "Failed to load message metadata";
      output.className = "error";
      output.textContent = err.message;
    });
  </script>
</body>
</html>
